name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install ruff
      run: pip install ruff

    - name: Lint services
      run: ruff check services/

    - name: Install kubeconform
      run: |
        # kubeconform is the right tool for offline manifest validation:
        # validates YAML against the published K8s OpenAPI schemas without
        # needing a cluster, and handles CRDs (like KEDA's ScaledObject)
        # via --ignore-missing-schemas instead of failing on them.
        curl -L -o kubeconform.tar.gz \
          https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        tar xzf kubeconform.tar.gz
        chmod +x kubeconform
        sudo mv kubeconform /usr/local/bin/

    - name: Validate Kubernetes manifests
      run: kubeconform -summary -strict -ignore-missing-schemas -kubernetes-version 1.29.0 kubernetes/

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, foundry-iq, market-intel, frontend]
        # disease-detector excluded — its build pre-downloads a HuggingFace
        # model (~hundreds of MB) which times out frequently in CI. It builds
        # fine locally / in Minikube.
    steps:
    - uses: actions/checkout@v5
    - name: Build ${{ matrix.service }}
      run: docker build -t agrisense-${{ matrix.service }}:test ./services/${{ matrix.service }}/

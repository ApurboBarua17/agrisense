name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install ruff
      run: pip install ruff

    - name: Lint services
      run: ruff check services/

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Validate Kubernetes manifests
      run: kubectl apply --dry-run=client --validate=false -f kubernetes/ --recursive

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, foundry-iq, market-intel, frontend]
        # disease-detector excluded — its build pre-downloads a HuggingFace
        # model (~hundreds of MB) which times out frequently in CI. It builds
        # fine locally / in Minikube.
    steps:
    - uses: actions/checkout@v5
    - name: Build ${{ matrix.service }}
      run: docker build -t agrisense-${{ matrix.service }}:test ./services/${{ matrix.service }}/
